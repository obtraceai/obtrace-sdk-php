name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: composer install --no-interaction --ignore-platform-reqs || true
      - run: php -l src/ObtraceClient.php
      - run: php -l src/OtelSetup.php
      - run: php -l src/Types.php
      - run: php -l src/Framework.php
      - run: php -l src/SemanticMetrics.php
